name: CD Deploy (Docker Compose)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull latest image and deploy
        run: |
          docker compose pull
          docker compose up -d

      - name: Smoke test
        run: |
          pip install requests
          python scripts/smoke_test.py
